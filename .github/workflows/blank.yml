name: CICD PIPELINE
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: list of file
        run: ls -R 
      - name: building step
        run: echo "BUILD SUCCESSFULL"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: testing step
        run: |
          echo "TEST SUCCESSFULL"
          echo ${{vars.name}}
          echo ${{secrets.password}}
        
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: deploy step
        run: echo "DEPLOY SUCCESSFULL"
